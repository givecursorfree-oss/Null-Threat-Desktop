name: Build Null Threat

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

env:
  CLAMAV_VERSION: "1.5.2"
  RUSTFLAGS: "--remap-path-prefix=/home/runner/work=."

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Typecheck frontend
        run: npm ci && npm run build:vite

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build + scanner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf build-essential curl wget file libssl-dev libsecret-1-dev \
            clamav clamav-freshclam patchelf yara ffmpeg perl

      - uses: dtolnay/rust-toolchain@stable

      - name: Bundle scanner tools for Linux
        run: |
          chmod +x scripts/setup-clamav-linux.sh scripts/setup-yara-ffprobe-linux.sh scripts/ci-eicar-smoke.sh
          ./scripts/setup-clamav-linux.sh
          ./scripts/setup-yara-ffprobe-linux.sh
          ./src-tauri/binaries/linux/clamscan --version
          ./src-tauri/binaries/linux/yara --version
          ./src-tauri/binaries/linux/ffprobe -version
          ./src-tauri/binaries/linux/ffmpeg -version
          PERL5LIB=src-tauri/binaries/linux/exiftool_lib ./src-tauri/binaries/linux/exiftool -ver
          ./scripts/ci-eicar-smoke.sh ./src-tauri/binaries/linux/clamscan src-tauri/resources/clamav
          ls -la src-tauri/resources/clamav/
          rm -f src-tauri/binaries/linux/freshclam.conf 2>/dev/null || true

      - name: Run scanner unit tests
        run: cd src-tauri && cargo test --lib 'scanner::'

      - name: Build Linux app
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: null-threat-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install scanner tools via Homebrew
        run: brew install clamav yara ffmpeg perl

      - name: Bundle scanner tools for macOS
        run: |
          chmod +x scripts/setup-clamav-macos.sh scripts/setup-yara-ffprobe-macos.sh scripts/ci-eicar-smoke.sh
          ./scripts/setup-clamav-macos.sh
          ./scripts/setup-yara-ffprobe-macos.sh
          ./src-tauri/binaries/macos/clamscan --version
          ./src-tauri/binaries/macos/yara --version
          ./src-tauri/binaries/macos/ffprobe -version
          ./src-tauri/binaries/macos/ffmpeg -version
          PERL5LIB=src-tauri/binaries/macos/exiftool_lib ./src-tauri/binaries/macos/exiftool -ver
          ./scripts/ci-eicar-smoke.sh ./src-tauri/binaries/macos/clamscan src-tauri/resources/clamav
          ls -la src-tauri/resources/clamav/
          rm -f src-tauri/binaries/macos/freshclam.conf 2>/dev/null || true

      - name: Build macOS app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x scripts/ci-sanitize-signing-env.sh
          source scripts/ci-sanitize-signing-env.sh
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: null-threat-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Bundle scanner tools for Windows
        shell: pwsh
        run: |
          if (Test-Path src-tauri/binaries/windows/clamscan.exe) {
            Write-Host "Using existing bundled ClamAV binaries"
          } else {
            .\scripts\setup-clamav-ci.ps1
          }
          .\scripts\setup-yara-ffprobe.ps1
          .\src-tauri\binaries\windows\clamscan.exe --version
          .\src-tauri\binaries\windows\yara.exe --version
          .\src-tauri\binaries\windows\ffprobe.exe -version
          .\src-tauri\binaries\windows\ffmpeg.exe -version
          .\src-tauri\binaries\windows\exiftool.exe -ver
          Get-ChildItem src-tauri\resources\clamav\
          Remove-Item -Force -ErrorAction SilentlyContinue src-tauri\binaries\windows\freshclam.conf

      - name: Build Windows app
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          . .\scripts\ci-sanitize-signing-env.ps1
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: null-threat-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build-linux, build-macos, build-windows]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Flatten release files
        run: |
          mkdir -p release
          find release-artifacts -type f \( \
            -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o \
            -name '*.deb' -o -name '*.AppImage' \
            \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate SHA256 checksums
        run: |
          chmod +x scripts/generate-release-checksums.sh
          ./scripts/generate-release-checksums.sh release SHA256SUMS.txt
          cp SHA256SUMS.txt release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*
            SHA256SUMS.txt
          generate_release_notes: true
          body: |
            ## Null Threat ${{ github.ref_name }}

            **Scan locally. Trust nothing.**

            ### Downloads

            | Platform | Artifacts |
            |----------|-----------|
            | Windows | `.msi` (recommended) or NSIS `.exe` |
            | macOS | `.dmg` |
            | Linux | `.deb` or `.AppImage` |

            ### Verify integrity

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```

            ### Offline vs online

            - **Scanning** runs fully on your machine — no cloud upload of files or results.
            - **Optional updates** (MalwareBazaar hashes, ClamAV signatures) need internet only when you click update in Settings.
            - Release builds ship with bundled ClamAV definitions for day-one offline scanning.

            ### Code signing

            Installers are **Authenticode / Apple-notarized** when signing secrets are configured in CI. Community builds may be unsigned until certificates are added — verify `SHA256SUMS.txt` and see [SECURITY.md](SECURITY.md).

            See [CONTRIBUTING.md](CONTRIBUTING.md) and [docs/TESTING.md](docs/TESTING.md) for the v1.0 field test checklist.
