name: Build Null Threat

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CLAMAV_VERSION: "1.5.2"
  RUSTFLAGS: "--remap-path-prefix=/home/runner/work=."

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies for tests
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf build-essential libssl-dev libsecret-1-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Run scanner unit tests
        run: cd src-tauri && cargo test 'scanner::'

      - name: Typecheck frontend
        run: npm ci && npm run build:vite

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux build + scanner dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf build-essential curl wget file libssl-dev libsecret-1-dev \
            clamav clamav-freshclam patchelf yara ffmpeg perl

      - uses: dtolnay/rust-toolchain@stable

      - name: Bundle scanner tools for Linux
        run: |
          chmod +x scripts/setup-clamav-linux.sh scripts/setup-yara-ffprobe-linux.sh
          ./scripts/setup-clamav-linux.sh
          ./scripts/setup-yara-ffprobe-linux.sh
          ./src-tauri/binaries/linux/clamscan --version
          ./src-tauri/binaries/linux/yara --version
          ./src-tauri/binaries/linux/ffprobe -version
          ./src-tauri/binaries/linux/ffmpeg -version
          PERL5LIB=src-tauri/binaries/linux/exiftool_lib ./src-tauri/binaries/linux/exiftool -ver
          if [ -f src-tauri/resources/clamav/main.cvd ]; then
            echo "test" > /tmp/null-threat-clam-test.txt
            ./src-tauri/binaries/linux/clamscan --database=src-tauri/resources/clamav /tmp/null-threat-clam-test.txt
          else
            echo "Skipping scan test: virus DB not available in CI"
          fi
          ls -la src-tauri/resources/clamav/
          rm -f src-tauri/binaries/linux/freshclam.conf 2>/dev/null || true

      - name: Build Linux app
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: null-threat-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install scanner tools via Homebrew
        run: brew install clamav yara ffmpeg perl

      - name: Bundle scanner tools for macOS
        run: |
          chmod +x scripts/setup-clamav-macos.sh scripts/setup-yara-ffprobe-macos.sh
          ./scripts/setup-clamav-macos.sh
          ./scripts/setup-yara-ffprobe-macos.sh
          ./src-tauri/binaries/macos/clamscan --version
          ./src-tauri/binaries/macos/yara --version
          ./src-tauri/binaries/macos/ffprobe -version
          ./src-tauri/binaries/macos/ffmpeg -version
          PERL5LIB=src-tauri/binaries/macos/exiftool_lib ./src-tauri/binaries/macos/exiftool -ver
          if [ -f src-tauri/resources/clamav/main.cvd ]; then
            echo "test" > /tmp/null-threat-clam-test.txt
            ./src-tauri/binaries/macos/clamscan --database=src-tauri/resources/clamav /tmp/null-threat-clam-test.txt
          else
            echo "Skipping scan test: virus DB not available in CI"
          fi
          ls -la src-tauri/resources/clamav/
          rm -f src-tauri/binaries/macos/freshclam.conf 2>/dev/null || true

      - name: Build macOS app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: null-threat-macos
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Bundle scanner tools for Windows
        shell: pwsh
        run: |
          if (Test-Path src-tauri/binaries/windows/clamscan.exe) {
            Write-Host "Using existing bundled ClamAV binaries"
          } else {
            .\scripts\setup-clamav-ci.ps1
          }
          .\scripts\setup-yara-ffprobe.ps1
          .\src-tauri\binaries\windows\clamscan.exe --version
          .\src-tauri\binaries\windows\yara.exe --version
          .\src-tauri\binaries\windows\ffprobe.exe -version
          .\src-tauri\binaries\windows\ffmpeg.exe -version
          .\src-tauri\binaries\windows\exiftool.exe -ver
          Get-ChildItem src-tauri\resources\clamav\
          Remove-Item -Force -ErrorAction SilentlyContinue src-tauri\binaries\windows\freshclam.conf

      - name: Build Windows app
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          npm ci
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: null-threat-windows
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
